<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Piri's Workbook">
<meta name="theme-color" content="#0a0a0a">
<title>Piri's Workbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f0;--muted:#666;--muted2:#999;
  --accent:#e8ff47;--accent2:#47ffd4;--danger:#ff4747;--success:#47ff8a;--pr:#ffd700;
  --safe:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;overflow:hidden}
body{display:flex;flex-direction:column}

.topbar{display:flex;align-items:flex-end;padding:max(env(safe-area-inset-top,0px),14px) 18px 12px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;gap:10px}
.topbar-title{font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:.08em;color:var(--accent)}
.topbar-sub{font-size:11px;color:var(--muted);font-family:"DM Mono",monospace;padding-bottom:2px}

.main-nav{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.main-tab{flex:1;padding:12px 0;font-size:13px;font-weight:500;text-align:center;cursor:pointer;color:var(--muted);border:none;background:transparent;border-bottom:2px solid transparent;font-family:"DM Sans",sans-serif}
.main-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.view{display:none;flex:1;overflow:hidden;flex-direction:column}
.view.active{display:flex}

/* DAY STRIP */
.day-strip{display:flex;gap:6px;overflow-x:auto;padding:10px 16px;flex-shrink:0;scrollbar-width:none}
.day-strip::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-family:"DM Mono",monospace;border:1px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;white-space:nowrap}
.day-tab.active{background:var(--accent);color:#0a0a0a;border-color:var(--accent);font-weight:500}

.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.scroll-area::-webkit-scrollbar{display:none}
.day-panel{display:none;padding:16px 16px calc(var(--safe) + 20px)}
.day-panel.active{display:block}

/* DAY HERO */
.day-hero{border-radius:16px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden}
.day-hero::before{content:"";position:absolute;right:-20px;top:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.03)}
.day-num{font-family:"Bebas Neue",sans-serif;font-size:48px;line-height:1;opacity:.18;position:absolute;right:16px;bottom:8px;letter-spacing:.05em}
.day-title{font-family:"Bebas Neue",sans-serif;font-size:26px;letter-spacing:.06em;margin-bottom:4px}
.day-sub{font-size:12px;opacity:.7;font-family:"DM Mono",monospace}
.day-desc{font-size:12px;color:rgba(255,255,255,0.5);margin-top:10px;line-height:1.6;border-top:1px solid rgba(255,255,255,0.1);padding-top:10px}

.section{margin-bottom:14px}
.section-hd{font-family:"DM Mono",monospace;font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;padding:0 2px}
.card{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:10px}

/* EXERCISES */
.ex-hd{padding:12px 14px 10px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border)}
.ex-name{font-size:14px;font-weight:500;color:var(--text)}
.ex-tag{font-size:10px;font-family:"DM Mono",monospace;color:var(--muted);margin-top:2px}
.pr-banner{display:flex;align-items:center;padding:10px 14px;background:rgba(255,215,0,0.07);border-bottom:1px solid rgba(255,215,0,0.15)}
.pr-left{display:flex;flex-direction:column;gap:2px}
.pr-label{font-size:10px;font-family:"DM Mono",monospace;color:var(--pr);letter-spacing:.08em}
.pr-value{font-family:"Bebas Neue",sans-serif;font-size:26px;letter-spacing:.05em;color:var(--pr);line-height:1}
.pr-reps{font-size:11px;font-family:"DM Mono",monospace;color:rgba(255,215,0,0.6);margin-top:1px}
.pr-none{font-size:11px;font-family:"DM Mono",monospace;color:var(--muted);padding:8px 14px;border-bottom:1px solid var(--border)}
.pr-flash{display:none;text-align:center;padding:8px;background:rgba(255,215,0,0.12);font-family:"Bebas Neue",sans-serif;font-size:18px;color:var(--pr);letter-spacing:.1em}
.pr-flash.show{display:block}
.ex-body{padding:10px 14px 12px}
.sets-head{display:grid;grid-template-columns:36px 1fr 1fr 1fr;gap:6px;margin-bottom:6px}
.sets-head span{font-size:10px;font-family:"DM Mono",monospace;color:var(--muted);text-align:center}
.sets-head span:first-child{text-align:left}
.set-row{display:grid;grid-template-columns:36px 1fr 1fr 1fr;gap:6px;margin-bottom:5px;align-items:center}
.set-num{font-size:12px;font-family:"DM Mono",monospace;color:var(--muted)}
.set-input{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:14px;font-family:"DM Mono",monospace;padding:8px 6px;text-align:center;width:100%;-webkit-appearance:none;appearance:none}
.set-input:focus{outline:none;border-color:var(--accent);color:var(--accent)}
.add-set-btn{margin-top:8px;width:100%;padding:8px;border-radius:8px;background:transparent;border:1px dashed var(--border2);color:var(--muted);font-size:12px;font-family:"DM Mono",monospace;cursor:pointer}
.td-row{display:flex;gap:8px;margin-bottom:6px;align-items:center}
.td-label{font-size:11px;font-family:"DM Mono",monospace;color:var(--muted);min-width:90px}
.td-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:14px;font-family:"DM Mono",monospace;padding:8px 10px}
.td-input:focus{outline:none;border-color:var(--accent2);color:var(--accent2)}
.interval-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.interval-card{background:var(--surface2);border-radius:10px;padding:10px}
.interval-num{font-size:10px;font-family:"DM Mono",monospace;color:var(--muted);margin-bottom:6px}
.interval-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:13px;font-family:"DM Mono",monospace;padding:6px 8px;margin-bottom:4px}
.interval-input:focus{outline:none;border-color:var(--accent2)}
.interval-input:last-child{margin-bottom:0}
.interval-lbl{font-size:9px;color:var(--muted);font-family:"DM Mono",monospace;margin-bottom:2px}
.save-row{display:flex;gap:8px;margin-top:12px}
.save-btn{flex:1;padding:11px;border-radius:10px;background:var(--accent);color:#0a0a0a;font-size:13px;font-weight:500;font-family:"DM Sans",sans-serif;border:none;cursor:pointer}
.save-btn:active{opacity:.7}
.save-btn.saved{background:var(--success)}
.rest-msg{text-align:center;padding:32px 20px;font-family:"Bebas Neue",sans-serif;font-size:28px;color:var(--muted);letter-spacing:.1em}

/* NUTRITION (inline on training day) */
.nutr-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.nutr-cell{background:var(--surface);padding:12px 14px}
.nutr-label{font-size:10px;font-family:"DM Mono",monospace;color:var(--muted);margin-bottom:6px}
.nutr-value{font-size:20px;font-family:"Bebas Neue",sans-serif;letter-spacing:.05em;color:var(--accent)}
.nutr-auto{font-size:20px;font-family:"Bebas Neue",sans-serif;letter-spacing:.05em;color:var(--muted2)}
.nutr-auto-note{font-size:9px;font-family:"DM Mono",monospace;color:var(--muted);margin-top:2px}
.nutr-input{width:100%;background:transparent;border:none;color:var(--text);font-size:20px;font-family:"Bebas Neue",sans-serif;letter-spacing:.05em;padding:0}
.nutr-input:focus{outline:none;color:var(--accent)}
.nutr-input::placeholder{color:var(--muted)}
.intake-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:14px;margin-top:10px;display:flex;justify-content:space-between;align-items:center}
.intake-label{font-size:13px;font-weight:500}
.intake-input{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--accent);font-size:18px;font-family:"Bebas Neue",sans-serif;letter-spacing:.05em;padding:8px 12px;width:130px;text-align:right}
.intake-input:focus{outline:none;border-color:var(--accent)}
.net-card{border-radius:14px;border:1px solid var(--border);padding:16px;margin-top:10px;display:flex;justify-content:space-between;align-items:center}
.net-card.surplus{background:rgba(71,255,138,0.07);border-color:rgba(71,255,138,0.2)}
.net-card.deficit{background:rgba(255,71,71,0.07);border-color:rgba(255,71,71,0.2)}
.net-card.neutral{background:var(--surface)}
.net-label{font-size:10px;font-family:"DM Mono",monospace;color:var(--muted);letter-spacing:.08em;margin-bottom:4px}
.net-sublabel{font-size:10px;font-family:"DM Mono",monospace;color:var(--muted);margin-top:3px}
.net-value{font-family:"Bebas Neue",sans-serif;font-size:32px;letter-spacing:.05em;line-height:1}
.net-value.surplus{color:var(--success)}.net-value.deficit{color:var(--danger)}.net-value.neutral{color:var(--muted2)}
.net-badge{font-size:11px;font-family:"DM Mono",monospace;padding:4px 10px;border-radius:20px}
.net-badge.surplus{background:rgba(71,255,138,0.15);color:var(--success)}
.net-badge.deficit{background:rgba(255,71,71,0.15);color:var(--danger)}
.net-badge.neutral{background:var(--surface2);color:var(--muted2)}

/* NUTRITION TAB SUB-TABS */
.nutr-sub-nav{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;padding:0 16px}
.nutr-sub-tab{padding:10px 16px;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);border:none;background:transparent;border-bottom:2px solid transparent;font-family:"DM Sans",sans-serif;white-space:nowrap}
.nutr-sub-tab.active{color:var(--accent2);border-bottom-color:var(--accent2)}
.nutr-sub-view{display:none;flex:1;overflow:hidden;flex-direction:column}
.nutr-sub-view.active{display:flex}

/* RICH EDITOR */
.editor-wrap{flex:1;padding:16px;display:flex;flex-direction:column;gap:10px;overflow:hidden}
.editor-label{font-size:10px;font-family:"DM Mono",monospace;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.editor-toolbar{display:flex;gap:4px;flex-wrap:wrap;padding:8px 10px;background:var(--surface);border:1px solid var(--border2);border-radius:10px 10px 0 0;border-bottom:none;flex-shrink:0}
.tb-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-size:12px;cursor:pointer;font-family:"DM Sans",sans-serif;white-space:nowrap}
.tb-btn:active,.tb-btn.on{background:var(--surface2);color:var(--accent);border-color:var(--accent)}
.tb-btn b{font-weight:700}
.tb-btn u{text-decoration:underline}
.editor-body{flex:1;min-height:260px;background:var(--surface);border:1px solid var(--border2);border-radius:0 0 14px 14px;color:var(--text);font-size:14px;font-family:"DM Sans",sans-serif;line-height:1.8;padding:14px;overflow-y:auto;outline:none}
.editor-body:empty::before{content:attr(data-placeholder);color:var(--muted);pointer-events:none}
.editor-body h2{font-size:17px;font-weight:500;color:var(--text);margin:8px 0 4px}
.editor-body ul{padding-left:18px;margin:4px 0}
.editor-body li{margin:2px 0}
.save-editor-btn{padding:11px;border-radius:10px;background:var(--accent2);color:#0a0a0a;font-size:13px;font-weight:500;border:none;cursor:pointer;font-family:"DM Sans",sans-serif;flex-shrink:0}

/* RECIPES */
.recipes-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(var(--safe) + 80px)}
.recipes-scroll::-webkit-scrollbar{display:none}
.add-recipe-fab{position:sticky;bottom:16px;left:0;right:0;margin:0 auto;display:block;width:fit-content;background:var(--accent);color:#0a0a0a;border:none;border-radius:50px;padding:12px 22px;font-size:13px;font-weight:500;font-family:"DM Sans",sans-serif;cursor:pointer}
.recipe-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:14px}
.recipe-header{padding:14px 14px 10px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border)}
.recipe-name-input{background:transparent;border:none;color:var(--text);font-size:16px;font-weight:500;font-family:"DM Sans",sans-serif;width:100%;padding:0}
.recipe-name-input:focus{outline:none;color:var(--accent)}
.recipe-name-input::placeholder{color:var(--muted)}
.del-recipe-btn{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 0 0 8px;flex-shrink:0}
.recipe-body{padding:12px 14px}
.servings-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.servings-label{font-size:12px;font-family:"DM Mono",monospace;color:var(--muted)}
.servings-input{width:60px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--accent);font-size:14px;font-family:"DM Mono",monospace;padding:5px 8px;text-align:center}
.servings-input:focus{outline:none;border-color:var(--accent)}
.ing-table{width:100%;border-collapse:collapse;margin-bottom:8px}
.ing-table th{font-size:9px;font-family:"DM Mono",monospace;color:var(--muted);text-align:left;padding:4px 6px;border-bottom:1px solid var(--border);white-space:nowrap}
.ing-table th:last-child{text-align:right}
.ing-table td{padding:3px 4px;border-bottom:1px solid var(--border);vertical-align:middle}
.ing-table tr:last-child td{border-bottom:none}
.ing-inp{width:100%;background:transparent;border:none;color:var(--text);font-size:12px;font-family:"DM Mono",monospace;padding:4px 2px}
.ing-inp:focus{outline:none;color:var(--accent)}
.ing-inp::placeholder{color:var(--muted)}
.del-row-btn{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:2px 4px}
.add-ing-btn{width:100%;padding:7px;border-radius:8px;background:transparent;border:1px dashed var(--border2);color:var(--muted);font-size:12px;font-family:"DM Mono",monospace;cursor:pointer;margin-bottom:10px}
.recipe-totals{background:var(--surface2);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.rt-item{text-align:center}
.rt-label{font-size:9px;font-family:"DM Mono",monospace;color:var(--muted);margin-bottom:3px}
.rt-value{font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:.04em;color:var(--accent)}
.rt-divider{width:1px;height:28px;background:var(--border2)}

/* FINANCE */
.fin-sub-nav{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;padding:0 16px}
.fin-sub-tab{padding:10px 16px;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);border:none;background:transparent;border-bottom:2px solid transparent;font-family:"DM Sans",sans-serif;white-space:nowrap}
.fin-sub-tab.active{color:#a8e063;border-bottom-color:#a8e063}
.fin-sub-view{display:none;flex:1;overflow:hidden;flex-direction:column}
.fin-sub-view.active{display:flex}
.fin-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(var(--safe) + 80px)}
.fin-scroll::-webkit-scrollbar{display:none}
.savings-hd{display:grid;grid-template-columns:1fr 1fr 28px;gap:8px;padding:0 2px;margin-bottom:6px}
.savings-hd span{font-size:10px;font-family:"DM Mono",monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.savings-hd span:nth-child(2){text-align:right}
.savings-row{display:grid;grid-template-columns:1fr 1fr 28px;gap:8px;margin-bottom:6px;align-items:center}
.sav-inp{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;font-family:"DM Sans",sans-serif;padding:8px 10px;width:100%}
.sav-inp:focus{outline:none;border-color:#a8e063;color:#a8e063}
.sav-inp.amount{font-family:"DM Mono",monospace;text-align:right}
.sav-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px;text-align:center}
.add-sav-btn{width:100%;padding:9px;border-radius:8px;background:transparent;border:1px dashed var(--border2);color:var(--muted);font-size:12px;font-family:"DM Mono",monospace;cursor:pointer;margin-top:4px;margin-bottom:16px}
.sav-total-card{background:var(--surface);border:1px solid rgba(168,224,99,0.25);border-radius:14px;padding:16px;display:flex;justify-content:space-between;align-items:center}
.sav-total-label{font-size:11px;font-family:"DM Mono",monospace;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.sav-total-value{font-family:"Bebas Neue",sans-serif;font-size:34px;letter-spacing:.05em;color:#a8e063}
.fin-blank{flex:1;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);font-family:"DM Mono",monospace;text-align:center;padding:40px}


.c1{background:linear-gradient(135deg,#0d1f35,#0a1525)}.c1 .day-title{color:#78b4f0}
.c2{background:linear-gradient(135deg,#160d35,#0f0825)}.c2 .day-title{color:#a89ef5}
.c3{background:linear-gradient(135deg,#0d2010,#091509)}.c3 .day-title{color:#7ac47e}
.c4{background:linear-gradient(135deg,#2a1a05,#1a1003)}.c4 .day-title{color:#e8a84a}
.c5{background:linear-gradient(135deg,#2a0d0d,#1a0808)}.c5 .day-title{color:#f08a7a}
.c6{background:linear-gradient(135deg,#042018,#030f0c)}.c6 .day-title{color:#4cd9a8}
.c7{background:linear-gradient(135deg,#280d1a,#190810)}.c7 .day-title{color:#e07aaa}
.c8{background:linear-gradient(135deg,#2a0808,#1a0505)}.c8 .day-title{color:#f08080}
.c9{background:linear-gradient(135deg,#2a1a05,#1a1003)}.c9 .day-title{color:#e8a84a}
.c10{background:linear-gradient(135deg,#141414,#0a0a0a)}.c10 .day-title{color:#888}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Piri's Workbook</div>
</div>

<div class="main-nav">
  <button class="main-tab active" id="nav-training" onclick="switchView('training')">Training</button>
  <button class="main-tab" id="nav-nutrition" onclick="switchView('nutrition')">Nutrition</button>
  <button class="main-tab" id="nav-todo" onclick="switchView('todo')">To Do</button>
  <button class="main-tab" id="nav-work" onclick="switchView('work')">Work</button>
  <button class="main-tab" id="nav-mbbs" onclick="switchView('mbbs')">MBBS</button>
  <button class="main-tab" id="nav-chinese" onclick="switchView('chinese')">Chinese</button>
  <button class="main-tab" id="nav-finance" onclick="switchView('finance')">Finance</button>
</div>

<!-- TRAINING VIEW -->
<div class="view active" id="view-training">
  <div class="day-strip" id="dayStrip"></div>
  <div class="scroll-area" id="trainingScroll"></div>
</div>

<!-- NUTRITION VIEW -->
<div class="view" id="view-nutrition">
  <div class="nutr-sub-nav">
    <button class="nutr-sub-tab active" id="nsub-goals" onclick="switchNutrSub('goals')">Goals & Notes</button>
    <button class="nutr-sub-tab" id="nsub-recipes" onclick="switchNutrSub('recipes')">Recipes</button>
  </div>
  <div class="nutr-sub-view active" id="nview-goals">
    <div class="editor-wrap">
      <div class="editor-label">Nutritional Goals & Notes</div>
      <div class="editor-toolbar">
        <button class="tb-btn" onclick="edFmt('nutr-editor','h2')" title="Title"><b>T</b></button>
        <button class="tb-btn" onclick="edFmt('nutr-editor','bold')" title="Bold"><b>B</b></button>
        <button class="tb-btn" onclick="edFmt('nutr-editor','underline')" title="Underline"><u>U</u></button>
        <button class="tb-btn" onclick="edFmt('nutr-editor','bullet')" title="Bullet">• List</button>
      </div>
      <div class="editor-body" id="nutr-editor" contenteditable="true" data-placeholder="Write your nutritional goals, macro targets, dietary rules..."></div>
      <button class="save-editor-btn" onclick="saveEditor('nutr-editor','nutr_goals_html')">Save Notes</button>
    </div>
  </div>
  <div class="nutr-sub-view" id="nview-recipes">
    <div class="recipes-scroll" id="recipesContainer">
      <div id="recipesList"></div>
      <div id="noRecipes" style="text-align:center;padding:48px 20px;font-size:13px;color:var(--muted);font-family:DM Mono,monospace">No recipes yet.<br>Tap + Add Recipe to start.</div>
      <button class="add-recipe-fab" onclick="addRecipe()">+ Add Recipe</button>

];

// SUPABASE CONFIG
const SB_URL="https://ztsglnzdpqxxhdsczltg.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp0c2dsbnpkcHF4eGhkc2N6bHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MjY5MjMsImV4cCI6MjA5NTIwMjkyM30.0G127iu46_mX33jDmosFqyD94Tq0xBKb_KCjNjbVGoY";
const SB_HEADERS={"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"};

// Cache layer — reads from memory/localStorage, writes to both + Supabase
const cache={};
function lsGet(k){if(cache[k]!==undefined)return cache[k];try{const v=localStorage.getItem(k);const p=v?JSON.parse(v):null;cache[k]=p;return p;}catch(e){return null;}}
function lsSet(k,v){cache[k]=v;try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}sbSet(k,v);}
async function sbSet(k,v){try{await fetch(SB_URL+"/rest/v1/workbook_data",{method:"POST",headers:SB_HEADERS,body:JSON.stringify({key:k,value:JSON.stringify(v),updated_at:new Date().toISOString()})});}catch(e){}}
async function sbGet(k){try{const r=await fetch(SB_URL+"/rest/v1/workbook_data?key=eq."+encodeURIComponent(k)+"&select=value",{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}});const d=await r.json();if(d&&d[0])return JSON.parse(d[0].value);}catch(e){}return null;}
async function syncFromCloud(){
  try{
    const r=await fetch(SB_URL+"/rest/v1/workbook_data?select=key,value",{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}});
    const rows=await r.json();
    if(!Array.isArray(rows))return;
    rows.forEach(row=>{
      try{
        const v=JSON.parse(row.value);
        cache[row.key]=v;
        localStorage.setItem(row.key,row.value);
      }catch(e){}
    });
    applyCloudData();
  }catch(e){console.log("Offline, using local data");}
}
function applyCloudData(){
  // Editors
  const edMap={"nutr_goals_html":"nutr-editor","todo_html":"todo-editor","work_html":"work-editor","mbbs_html":"mbbs-editor","chinese_html":"chinese-editor"};
  Object.entries(edMap).forEach(([key,id])=>{const v=lsGet(key);if(v){const el=document.getElementById(id);if(el)el.innerHTML=v;}});
  // PRs
  Object.keys(cache).forEach(k=>{if(k.startsWith("pr_")){const id=k.slice(3);const prEl=document.getElementById("pr_"+id);if(prEl){const type=prEl.closest(".card")?prEl.dataset.type||inferType(id):"sets";prEl.innerHTML=prDisplay(id,type);}}});
  // Savings
  const sd=lsGet("savings_data");if(sd&&sd.length){savingsData=sd;renderSavings();}
  // Recipes
  const rc=lsGet("recipes");if(rc){recipes=rc;renderAllRecipes();}
}
function inferType(id){const ts=["rowing","skierg"];const td=["sledpush","sledpull"];const iv=["runs"];if(ts.includes(id))return"ts";if(td.includes(id))return"td";if(iv.includes(id))return"intervals";return"sets";}

function ls(k,v){if(v===undefined)return lsGet(k);else lsSet(k,v);}

window.switchView=function(v){

// RICH EDITOR
window.edFmt=function(edId,cmd){
  const ed=document.getElementById(edId);ed.focus();

};
// Load saved editor content from localStorage first
["nutr-editor","todo-editor","work-editor","mbbs-editor","chinese-editor"].forEach(id=>{

let savingsData=lsGet("savings_data")||[];
if(!savingsData.length) savingsData=[{name:"",value:""}];

function saveSavings(){lsSet("savings_data",savingsData);}

function calcSavingsTotal(){
  let t=0;
  document.querySelectorAll(".sav-row").forEach(r=>{
    t+=parseFloat(r.querySelector(".sav-val").value.replace(/[^0-9.]/g,""))||0;
  });
  document.getElementById("savingsTotal").textContent="£"+t.toLocaleString("en-GB",{minimumFractionDigits:2,maximumFractionDigits:2});
}

function buildSavingsRow(d,idx){
  const container=document.getElementById("savingsRows");
  const row=document.createElement("div");
  row.className="savings-row sav-row";row.dataset.idx=idx;
  row.innerHTML=`<input class="sav-inp sav-name" type="text" placeholder="e.g. S&P 500 ETF" value="${d.name||""}">
    <input class="sav-inp sav-val amount" type="text" inputmode="decimal" placeholder="£0.00" value="${d.value||""}">
    <button class="sav-del" onclick="delSavingsRow(this)">×</button>`;
  row.querySelector(".sav-name").addEventListener("input",e=>{savingsData[idx].name=e.target.value;saveSavings();});
  row.querySelector(".sav-val").addEventListener("input",e=>{savingsData[idx].value=e.target.value;saveSavings();calcSavingsTotal();});
  container.appendChild(row);
}

function renderSavings(){
  document.getElementById("savingsRows").innerHTML="";
  savingsData.forEach((d,i)=>buildSavingsRow(d,i));
  calcSavingsTotal();
}

window.addSavingsRow=function(){
  savingsData.push({name:"",value:""});
  saveSavings();renderSavings();
  const rows=document.querySelectorAll(".sav-row");
  if(rows.length) rows[rows.length-1].querySelector(".sav-name").focus();
};

window.delSavingsRow=function(btn){
  const idx=parseInt(btn.closest(".sav-row").dataset.idx);
  savingsData.splice(idx,1);
  if(!savingsData.length) savingsData=[{name:"",value:""}];
  saveSavings();renderSavings();
};

renderSavings();
function prGet(id){return ls("pr_"+id);}
function prSet(id,v){ls("pr_"+id,v);}
function toSecs(s){if(!s)return Infinity;const p=s.split(":");if(p.length===2)return parseInt(p[0]||0)*60+parseFloat(p[1]||0);return parseFloat(s)||Infinity;}

function prDisplay(id,type){
  const pr=prGet(id);
  if(!pr) return `<div class="pr-none">No PR set yet</div>`;
  if(type==="sets"){const repsLine=pr.reps?`<div class="pr-reps">${pr.reps} reps</div>`:"";return `<div class="pr-banner"><div class="pr-left"><span class="pr-label">🏆 Best Lift</span><span class="pr-value">${pr.val} KG</span>${repsLine}</div></div>`;}
  if(type==="td"||type==="ts") return `<div class="pr-banner"><div class="pr-left"><span class="pr-label">🏆 Best Time</span><span class="pr-value">${pr.val}</span></div></div>`;
  if(type==="intervals") return `<div class="pr-banner"><div class="pr-left"><span class="pr-label">🏆 Best Avg Run</span><span class="pr-value">${pr.val}</span></div></div>`;
  return "";
}

const strip=document.getElementById("dayStrip");
const trainingScroll=document.getElementById("trainingScroll");

DAYS.forEach((day,di)=>{
  const tab=document.createElement("button");
  tab.className="day-tab"+(di===0?" active":"");
  tab.textContent="D"+day.num;
  tab.onclick=()=>{
    document.querySelectorAll(".day-tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".day-panel").forEach(p=>p.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("dp"+day.num).classList.add("active");
    tab.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
  };
  strip.appendChild(tab);

  const panel=document.createElement("div");
  panel.className="day-panel"+(di===0?" active":"");
  panel.id="dp"+day.num;

  panel.innerHTML+=`<div class="day-hero ${day.color}"><div class="day-num">${day.num}</div><div class="day-title">${day.title}</div><div class="day-sub">${day.sub}</div><div class="day-desc">${day.desc}</div></div>`;

  if(day.exercises.length){
    let exHTML=`<div class="section"><div class="section-hd">Lifts & Performance</div>`;
    day.exercises.forEach(ex=>{
      exHTML+=`<div class="card"><div class="ex-hd"><div><div class="ex-name">${ex.name}</div><div class="ex-tag">${ex.tag}</div></div></div><div id="pr_${ex.id}" data-type="${ex.type}">${prDisplay(ex.id,ex.type)}</div><div class="pr-flash" id="flash_${ex.id}">🏆 NEW PR!</div><div class="ex-body">`;
      if(ex.type==="sets"){
        exHTML+=`<div class="sets-head"><span>#</span><span>KG</span><span>Reps</span><span>Notes</span></div>`;
        for(let i=1;i<=4;i++) exHTML+=`<div class="set-row" data-s="${i}"><span class="set-num">${i}</span><input class="set-input" type="number" inputmode="decimal" placeholder="—" data-f="w"><input class="set-input" type="number" inputmode="numeric" placeholder="—" data-f="r"><input class="set-input" type="text" placeholder="—" data-f="n"></div>`;
        exHTML+=`<button class="add-set-btn" onclick="addSet(this)">+ Add Set</button>`;
      } else if(ex.type==="td"){
        exHTML+=`<div class="td-row"><span class="td-label">${ex.fA} (mm:ss)</span><input class="td-input" type="text" inputmode="text" placeholder="00:00" data-f="a"></div><div class="td-row"><span class="td-label">${ex.fB}</span><input class="td-input" type="text" inputmode="decimal" placeholder="—" data-f="b"></div>`;
      } else if(ex.type==="ts"){
        exHTML+=`<div class="td-row"><span class="td-label">${ex.fA} (mm:ss)</span><input class="td-input" type="text" inputmode="text" placeholder="00:00" data-f="a"></div>`;
      } else if(ex.type==="intervals"){
        exHTML+=`<div class="interval-grid">`;
        for(let i=1;i<=ex.count;i++) exHTML+=`<div class="interval-card"><div class="interval-num">Interval ${i}</div><div class="interval-lbl">${ex.fA} (mm:ss)</div><input class="interval-input" type="text" inputmode="text" placeholder="00:00" data-f="run" data-i="${i}"><div class="interval-lbl">${ex.fB} (mm:ss)</div><input class="interval-input" type="text" inputmode="text" placeholder="00:00" data-f="wb" data-i="${i}"></div>`;
        exHTML+=`</div>`;
      }
      exHTML+=`<div class="save-row"><button class="save-btn" onclick="saveEx(this,'${ex.id}','${ex.type}')">Save & Check PR</button></div></div></div>`;
    });
    exHTML+=`</div>`;
    panel.innerHTML+=exHTML;
  }
  if(day.num===10) panel.innerHTML+=`<div class="rest-msg">REST DAY<br>RECOVER · SLEEP · EAT</div>`;

  // NUTRITION inline
  const isRest=day.num===10;
  panel.innerHTML+=`<div class="section"><div class="section-hd">Calories</div>
    <div class="card"><div class="nutr-grid">
      <div class="nutr-cell"><div class="nutr-label">BMR</div><div class="nutr-value">1650</div></div>
      <div class="nutr-cell"><div class="nutr-label">Exercise (kcal)</div>${isRest?'<div class="nutr-value" style="color:var(--muted)">0</div>':`<input class="nutr-input" type="number" inputmode="decimal" placeholder="—">`}</div>
      <div class="nutr-cell"><div class="nutr-label">Cardio (kcal)</div>${isRest?'<div class="nutr-value" style="color:var(--muted)">0</div>':`<input class="nutr-input" type="number" inputmode="decimal" placeholder="—">`}</div>
      <div class="nutr-cell"><div class="nutr-label">TEF (10% of intake)</div><div class="nutr-auto">—</div><div class="nutr-auto-note">auto-calculated</div></div>
    </div></div>
    <div class="intake-card"><div class="intake-label">Calorie Intake</div><input class="intake-input" type="number" inputmode="decimal" placeholder="— kcal"></div>
    <div class="net-card neutral"><div><div class="net-label">NET CALORIES</div><div class="net-value neutral">—</div><div class="net-sublabel">intake − (BMR + exercise + cardio + TEF)</div></div><span class="net-badge neutral">enter intake</span></div>
  </div>`;

  trainingScroll.appendChild(panel);

  setTimeout(()=>{
    const intakeEl=panel.querySelector(".intake-input");
    const tefEl=panel.querySelector(".nutr-auto");
    const netValEl=panel.querySelector(".net-value");
    const netBadgeEl=panel.querySelector(".net-badge");
    const netCardEl=panel.querySelector(".net-card");
    const netSubEl=panel.querySelector(".net-sublabel");
    const inputs=panel.querySelectorAll(".nutr-input");
    const exEl=isRest?null:(inputs[0]||null);
    const cardioEl=isRest?null:(inputs[1]||null);
    function recalc(){
      const intake=parseFloat(intakeEl.value)||0;
      const tef=Math.round(intake*0.1);
      tefEl.textContent=intake>0?tef:"—";
      const ex=exEl?(parseFloat(exEl.value)||0):0;
      const cardio=cardioEl?(parseFloat(cardioEl.value)||0):0;
      const totalOut=1650+ex+cardio+tef;
      const net=intake-totalOut;
      if(intake===0){netValEl.textContent="—";netValEl.className="net-value neutral";netBadgeEl.textContent="enter intake";netBadgeEl.className="net-badge neutral";netCardEl.className="net-card neutral";netSubEl.textContent="intake − (BMR + exercise + cardio + TEF)";}
      else{
        const sign=net>=0?"+":"";netValEl.textContent=sign+Math.round(net)+" kcal";
        if(net>50){netValEl.className="net-value surplus";netBadgeEl.textContent="surplus";netBadgeEl.className="net-badge surplus";netCardEl.className="net-card surplus";}
        else if(net<-50){netValEl.className="net-value deficit";netBadgeEl.textContent="deficit";netBadgeEl.className="net-badge deficit";netCardEl.className="net-card deficit";}
        else{netValEl.className="net-value neutral";netBadgeEl.textContent="maintenance";netBadgeEl.className="net-badge neutral";netCardEl.className="net-card neutral";}
        netSubEl.textContent=`${intake} in  −  ${Math.round(totalOut)} out`;
      }
    }
    intakeEl.addEventListener("input",recalc);
    if(exEl) exEl.addEventListener("input",recalc);
    if(cardioEl) cardioEl.addEventListener("input",recalc);
  },50);
});

function recipeCalcRow(row,card){
  const c100=parseFloat(row.querySelector('[data-f="c100"]').value)||0;
  const mass=parseFloat(row.querySelector('[data-f="mass"]').value)||0;
  const calEl=row.querySelector('[data-f="cal"]');
  if(c100>0&&mass>0){calEl.value=Math.round(c100*mass/100);calEl.style.color="var(--accent2)";}
  recipeCalcTotals(card);
}

function recipeCalcTotals(card){
  let total=0;
  card.querySelectorAll(".ing-row").forEach(r=>{total+=parseFloat(r.querySelector('[data-f="cal"]').value)||0;});
  const servings=parseFloat(card.querySelector(".servings-input").value)||1;
  card.querySelector(".rt-total").textContent=Math.round(total);
  card.querySelector(".rt-servings").textContent=servings;
  card.querySelector(".rt-per").textContent=Math.round(total/servings);
}

  const tbody=card.querySelector("tbody");
  const tr=document.createElement("tr");tr.className="ing-row";
  tr.innerHTML=`<td><input class="ing-inp" type="text" placeholder="Ingredient" data-f="name" value="${ing?ing.name:""}"></td>
    <td><input class="ing-inp" type="number" inputmode="decimal" placeholder="—" data-f="c100" value="${ing?ing.c100:""}" style="width:58px"></td>
    <td><input class="ing-inp" type="number" inputmode="decimal" placeholder="—" data-f="mass" value="${ing?ing.mass:""}" style="width:50px"></td>
    <td><input class="ing-inp" type="number" inputmode="decimal" placeholder="—" data-f="cal" value="${ing?ing.cal:""}" style="width:50px;text-align:right;color:var(--accent2)"></td>
    <td><button class="del-row-btn" onclick="delIngRow(this)">×</button></td>`;
  tr.querySelector('[data-f="c100"]').addEventListener("input",()=>recipeCalcRow(tr,card));
  tr.querySelector('[data-f="mass"]').addEventListener("input",()=>recipeCalcRow(tr,card));
  tr.querySelector('[data-f="cal"]').addEventListener("input",()=>recipeCalcTotals(card));
  tr.querySelectorAll(".ing-inp").forEach(inp=>inp.addEventListener("input",()=>autoSaveRecipes(card)));
  tbody.appendChild(tr);
}

function autoSaveRecipes(card){
  const idx=parseInt(card.dataset.idx);if(isNaN(idx)||idx>=recipes.length)return;
  const ings=[];
  card.querySelectorAll(".ing-row").forEach(r=>ings.push({name:r.querySelector('[data-f="name"]').value,c100:r.querySelector('[data-f="c100"]').value,mass:r.querySelector('[data-f="mass"]').value,cal:r.querySelector('[data-f="cal"]').value}));
  recipes[idx]={name:card.querySelector(".recipe-name-input").value,servings:parseFloat(card.querySelector(".servings-input").value)||1,ings};
  saveRecipes();
}

function renderRecipeCard(r,idx){
  const card=document.createElement("div");card.className="recipe-card";card.dataset.idx=idx;
  card.innerHTML=`<div class="recipe-header"><input class="recipe-name-input" type="text" placeholder="Recipe name..." value="${r.name||""}"><button class="del-recipe-btn" onclick="delRecipe(this)">×</button></div>
  <div class="recipe-body">
    <div class="servings-row"><span class="servings-label">Servings</span><input class="servings-input" type="number" inputmode="decimal" min="0.5" step="0.5" value="${r.servings||1}"></div>
    <table class="ing-table"><thead><tr><th>Ingredient</th><th>kcal/100g</th><th>Mass (g)</th><th style="text-align:right">kcal</th><th></th></tr></thead><tbody></tbody></table>
    <button class="add-ing-btn" onclick="addIngRow(this)">+ Add Ingredient</button>
    <div class="recipe-totals">
      <div class="rt-item"><div class="rt-label">Total kcal</div><div class="rt-value rt-total">0</div></div>
      <div class="rt-divider"></div>
      <div class="rt-item"><div class="rt-label">Servings</div><div class="rt-value rt-servings">${r.servings||1}</div></div>
      <div class="rt-divider"></div>
      <div class="rt-item"><div class="rt-label">kcal / serving</div><div class="rt-value rt-per">0</div></div>
    </div>
  </div>`;
  card.querySelector(".recipe-name-input").addEventListener("input",()=>autoSaveRecipes(card));
  card.querySelector(".servings-input").addEventListener("input",()=>{recipeCalcTotals(card);autoSaveRecipes(card);});
  if(r.ings&&r.ings.length) r.ings.forEach(ing=>buildIngRow(card,ing));
  else buildIngRow(card,null);
  setTimeout(()=>recipeCalcTotals(card),10);
  return card;
}

function renderAllRecipes(){
  const list=document.getElementById("recipesList");list.innerHTML="";
  document.getElementById("noRecipes").style.display=recipes.length?"none":"block";
  recipes.forEach((r,i)=>list.appendChild(renderRecipeCard(r,i)));
}
window.addRecipe=function(){recipes.push({name:"",servings:1,ings:[]});saveRecipes();renderAllRecipes();setTimeout(()=>{const cards=document.querySelectorAll(".recipe-card");if(cards.length)cards[cards.length-1].scrollIntoView({behavior:"smooth"});},100);};
window.delRecipe=function(btn){const card=btn.closest(".recipe-card");recipes.splice(parseInt(card.dataset.idx),1);saveRecipes();renderAllRecipes();};
window.addIngRow=function(btn){const card=btn.closest(".recipe-card");buildIngRow(card,null);recipeCalcTotals(card);autoSaveRecipes(card);};
window.delIngRow=function(btn){const card=btn.closest(".recipe-card");btn.closest("tr").remove();recipeCalcTotals(card);autoSaveRecipes(card);};
renderAllRecipes();

window.addSet=function(btn){
  const body=btn.closest(".ex-body");const n=body.querySelectorAll(".set-row").length+1;
  const d=document.createElement("div");d.className="set-row";d.dataset.s=n;
  d.innerHTML=`<span class="set-num">${n}</span><input class="set-input" type="number" inputmode="decimal" placeholder="—" data-f="w"><input class="set-input" type="number" inputmode="numeric" placeholder="—" data-f="r"><input class="set-input" type="text" placeholder="—" data-f="n">`;
  btn.before(d);
};
window.saveEx=function(btn,id,type){
  const body=btn.closest(".ex-body");const prEl=document.getElementById("pr_"+id);const flash=document.getElementById("flash_"+id);const current=prGet(id);let isNewPR=false;
  if(type==="sets"){let maxKg=0,maxReps=0;body.querySelectorAll(".set-row").forEach(r=>{const w=parseFloat(r.querySelector('[data-f="w"]').value)||0;const reps=parseInt(r.querySelector('[data-f="r"]').value)||0;if(w>maxKg){maxKg=w;maxReps=reps;}});if(!maxKg){alert("Enter at least one weight.");return;}if(!current||maxKg>current.val){isNewPR=true;prSet(id,{val:maxKg,reps:maxReps||null});}}
  else if(type==="td"||type==="ts"){const a=body.querySelector('[data-f="a"]').value;if(!a){alert("Enter a time.");return;}if(!current||toSecs(a)<toSecs(current.val)){isNewPR=true;prSet(id,{val:a});}}
  else if(type==="intervals"){const runs=[];body.querySelectorAll('[data-f="run"]').forEach(inp=>{if(inp.value)runs.push(toSecs(inp.value));});if(!runs.length){alert("Enter at least one run time.");return;}const avg=runs.reduce((a,b)=>a+b,0)/runs.length;const mm=Math.floor(avg/60).toString().padStart(2,"0");const ss=Math.round(avg%60).toString().padStart(2,"0");if(!current||avg<toSecs(current.val)){isNewPR=true;prSet(id,{val:`${mm}:${ss}`,});}}
  prEl.innerHTML=prDisplay(id,type);
  if(isNewPR){flash.classList.add("show");setTimeout(()=>flash.classList.remove("show"),2500);btn.textContent="🏆 New PR!";btn.style.background="var(--pr)";setTimeout(()=>{btn.textContent="Save & Check PR";btn.style.background="";},2000);}
  else{btn.classList.add("saved");btn.textContent="Saved ✓";setTimeout(()=>{btn.textContent="Save & Check PR";btn.classList.remove("saved");},1500);}
};

// Sync from cloud on load
syncFromCloud();
</script>
</body>
</html>
